<h2>Thêm truyện</h2>

<form [formGroup]="addForm" (ngSubmit)="submitForm()">
  <input formControlName="title" placeholder="Tên truyện" />
  <input formControlName="author" placeholder="Tác giả" />
  <input formControlName="views" type="number" placeholder="Lượt xem" />

  <button [disabled]="loading">
    {{ loading ? 'Đang thêm...' : 'Thêm' }}
  </button>
</form>

@if (success) {
  <p style="color:green">{{ success }}</p>
}

@if (error) {
  <p style="color:red">{{ error }}</p>
}
